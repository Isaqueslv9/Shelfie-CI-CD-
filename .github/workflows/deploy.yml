name: deploy shelfie para ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_APP: ${{ secrets.ECR_REPOSITORY_APP }}
  ECR_REPOSITORY_NGINX: ${{ secrets.ECR_REPOSITORY_NGINX }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}     

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configurar credenciais na AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
 
    - name: Login no Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag e push da imagem do app
      run: |
        docker build -t $ECR_REPOSITORY_APP:latest ./app
        docker tag $ECR_REPOSITORY_APP:latest ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY_APP}:latest
        docker push ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY_APP}:latest

    - name: Build, tag e push da imagem do nginx
      run: |
        docker build -f nginx/dockerfile -t $ECR_REPOSITORY_NGINX:latest .
        docker tag $ECR_REPOSITORY_NGINX:latest ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY_NGINX}:latest
        docker push ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY_NGINX}:latest

    - name: Atualizar serviço do Amazon ECS
      run: |
       aws ecs update-service \
        --cluster $ECS_CLUSTER \
        --service $ECS_SERVICE \
        --force-new-deployment
        